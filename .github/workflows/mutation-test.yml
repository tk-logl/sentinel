name: Mutation Testing

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**/*.py'
      - 'voice/backend/**/*.py'
  schedule:
    # Nightly full run at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Files to mutate (space-separated, or "all")'
        required: false
        default: ''

jobs:
  mutation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install mutmut pytest

      - name: Cache mutmut results
        uses: actions/cache@v4
        with:
          path: .mutmut-cache
          key: mutmut-${{ runner.os }}-${{ hashFiles('apps/**/*.py', 'voice/backend/**/*.py') }}
          restore-keys: |
            mutmut-${{ runner.os }}-

      - name: Determine mutation targets
        id: targets
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: only changed Python source files (not test files)
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | grep -v 'test_' | grep -v '__pycache__' | grep -v 'migrations' | tr '\n' ' ')
            echo "files=$CHANGED" >> $GITHUB_OUTPUT
            echo "mode=incremental" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.target }}" ]] && [[ "${{ github.event.inputs.target }}" != "all" ]]; then
            echo "files=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
            echo "mode=targeted" >> $GITHUB_OUTPUT
          else
            echo "files=apps/" >> $GITHUB_OUTPUT
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      - name: Run mutation tests
        if: steps.targets.outputs.files != ''
        run: |
          echo "=== Mutation Testing (${{ steps.targets.outputs.mode }}) ==="
          echo "Targets: ${{ steps.targets.outputs.files }}"
          echo ""
          
          SCORE_TOTAL=0
          KILLED_TOTAL=0
          SURVIVED_TOTAL=0
          
          for target in ${{ steps.targets.outputs.files }}; do
            if [[ ! -f "$target" ]] && [[ ! -d "$target" ]]; then
              echo "Skipping: $target (not found)"
              continue
            fi
            
            echo "--- Mutating: $target ---"
            python3 -m mutmut run --paths-to-mutate="$target" --no-progress 2>&1 || true
            
            # Collect results
            RESULTS=$(python3 -m mutmut results 2>&1 || true)
            echo "$RESULTS"
            echo ""
          done
          
          # Final summary
          python3 -m mutmut results 2>&1 | tail -5

      - name: Check mutation score
        if: steps.targets.outputs.files != ''
        run: |
          RESULTS=$(python3 -m mutmut results 2>&1 || echo "0% mutation score")
          SCORE=$(echo "$RESULTS" | grep -oP '\d+(?=% mutation score)' || echo "0")
          echo "Mutation score: ${SCORE}%"
          
          THRESHOLD=70
          if [[ "$SCORE" -lt "$THRESHOLD" ]]; then
            echo "::warning::Mutation score ${SCORE}% is below ${THRESHOLD}% threshold"
            # Warning only for now — set exit 1 when ready to enforce
          else
            echo "Mutation score ${SCORE}% meets threshold"
          fi

      - name: Generate report
        if: always() && steps.targets.outputs.files != ''
        run: |
          python3 -m mutmut html 2>/dev/null || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: html/
          if-no-files-found: ignore
